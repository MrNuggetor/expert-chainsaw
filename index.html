<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quick Question</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;

    /* 🌸 soft girly gradient background */
    background: linear-gradient(135deg, #ffd6e8, #ffe9f3, #e0f7ff);
    overflow: hidden;
  }

  .box {
    text-align: center;
    background: rgba(255, 255, 255, 0.6);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    backdrop-filter: blur(10px);
  }

  h1 {
    color: #ff4d88;
    margin-bottom: 30px;
  }

  .btn {
    padding: 12px 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    margin: 10px;
    transition: 0.2s;
  }

  #yes {
    background: #ff7aa2;
    color: white;
  }

  #yes:hover {
    transform: scale(1.05);
  }

  #no {
    background: #a0c4ff;
    color: white;
    position: absolute;
  }

  #meme {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #ff4d88;
  }

  img {
    margin-top: 10px;
    border-radius: 12px;
  }
</style>
</head>

<body>

<div class="box">
  <h1>Will you buy me ice cream? 🍦</h1>

  <button class="btn" id="yes">Yes 💖</button>
  <button class="btn" id="no">No 🙈</button>

  <div id="meme">
    yayyy 😭💗<br>
    <img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif" width="220">
  </div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const meme = document.getElementById("meme");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

yesBtn.addEventListener("click", () => {
  meme.style.display = "block";
});
</script>

</body>
</html>
