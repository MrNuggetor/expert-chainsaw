<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question 😌</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e8, #ffe9f3, #e0f7ff);
  }

  .box {
    text-align: center;
    background: rgba(255,255,255,0.7);
    padding: 40px;
    border-radius: 20px;
  }

  h1 {
    color: #ff4d88;
  }

  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
    font-size: 16px;
  }

  #yes {
    background: #ff7aa2;
    color: white;
  }

  #no {
    background: #a0c4ff;
    color: white;
  }

  #meme {
    display: none;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="box">
  <h1>Will you buy me ice cream? 🍦</h1>

  <button class="btn" id="yes">Yes 💖</button>
  <button class="btn" id="no">No 🙄</button>

  <div id="meme">
    😭💗 I knew it!!<br><br>
    <img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif" width="220">
  </div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const meme = document.getElementById("meme");

const responses = [
  "Be serious 😑",
  "Try again...",
  "That’s not the right answer 😂",
  "You’re joking right?",
  "Just press yes 😌",
  "Don’t do this...",
  "Okay now you’re being stubborn 😭"
];

let count = 0;

noBtn.addEventListener("click", () => {
  noBtn.textContent = responses[count % responses.length];
  count++;
});

yesBtn.addEventListener("click", () => {
  meme.style.display = "block";
});
</script>

</body>
</html>
